name: rusty-SUNDIALS CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  # API keys — sourced ONLY from GitHub Actions Secrets, never hardcoded
  MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
  GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY }}
  GH_PAT:          ${{ secrets.GH_PAT }}
  GH_TOKEN:        ${{ secrets.GH_PAT }}

jobs:
  build_and_test:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check Formatting
        # rustfmt.toml excludes crates/sundials-core/src/generated (Rust 2024 syntax)
        run: cargo fmt --all -- --check

      - name: Clippy Lints
        run: cargo clippy --workspace --features experimental -- -D warnings

      - name: Build Workspace
        run: cargo build --workspace --all-targets --features experimental

      - name: Run Tests
        run: cargo test --workspace --features experimental

  docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build Docs
        run: cargo doc --workspace --no-deps --document-private-items --features experimental

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install grcov
        run: cargo install grcov

      - name: Run Tests with Coverage
        env:
          RUSTFLAGS: "-Cinstrument-coverage"
          LLVM_PROFILE_FILE: "coverage-%p-%m.profraw"
        # Include experimental feature so benchmark_a100_hpc compiles
        run: cargo test --workspace --features experimental

      - name: Generate HTML Report
        run: |
          grcov . -s . --binary-path ./target/debug/ -t html --branch \
            -o ./target/debug/coverage

  wasm:
    name: Build WebAssembly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build WASM
        # Exclude 'examples' crate: it has platform-specific deps (tokio, rayon)
        # incompatible with wasm32-unknown-unknown target.
        run: cargo build --workspace --exclude examples --target wasm32-unknown-unknown

  lean_proofs:
    name: Verify Lean 4 Proofs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Verify Proofs
        run: |
          cd proofs/lean4
          lean --run cvode.lean

  robertson_benchmark:
    name: Robertson Benchmark (CPU-only, no GCP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build Robertson example
        run: cargo build --example robertson --release

      - name: Run Robertson benchmark
        id: bench
        run: |
          echo "=== Robertson Stiff ODE Benchmark (Rust BDF) ==="
          START=$(date +%s%N)
          ./target/release/examples/robertson 2>&1 | tee /tmp/robertson_output.txt
          END=$(date +%s%N)
          ELAPSED_MS=$(( (END - START) / 1000000 ))
          echo "wall_time_ms=$ELAPSED_MS" >> "$GITHUB_OUTPUT"
          echo ""
          echo "Wall time: ${ELAPSED_MS}ms"

      - name: Compare against LLNL C reference
        run: |
          python3 - << 'PYEOF'
          import re, sys

          output = open("/tmp/robertson_output.txt").read()
          print("=== Raw output ===")
          print(output)

          # Extract key metrics from new format
          steps_m     = re.search(r"Steps:\s+(\d+)\s+\(C ref: 1070, ratio: ([\d.]+)x\)", output)
          rhs_m       = re.search(r"RHS evals:\s+(\d+)\s+\(C ref: 1537, ratio: ([\d.]+)x\)", output)
          cons_err_m  = re.search(r"Conservation error:\s+([0-9eE+.\-]+)", output)
          cons_pass   = "Conservation: PASS" in output

          C_STEPS, C_RHS = 1070, 1537

          print("\n=== C vs Rust Comparison ===")
          ok = True

          if steps_m:
              rust_steps = int(steps_m.group(1))
              ratio = float(steps_m.group(2))
              status = "✅" if ratio < 5.0 else "⚠️ "
              print(f"Steps:     Rust={rust_steps}  C={C_STEPS}  ratio={ratio:.1f}×  {status}")
          else:
              print("Steps: (not found in output)")

          if rhs_m:
              rust_rhs = int(rhs_m.group(1))
              ratio = float(rhs_m.group(2))
              status = "✅" if ratio < 8.0 else "⚠️ "
              print(f"RHS evals: Rust={rust_rhs}  C={C_RHS}  ratio={ratio:.1f}×  {status}")

          if cons_err_m:
              err = float(cons_err_m.group(1))
              status = "✅" if err < 1e-12 else "🔴 FAIL"
              print(f"Conservation error: {err:.2e}  {status}")
              if err >= 1e-12:
                  ok = False
          else:
              print("Conservation error: (not found — checking PASS marker)")
              if not cons_pass:
                  ok = False

          print(f"\n{'✅ PASS — conservation verified' if ok else '🔴 FAIL — conservation error too large'}")
          sys.exit(0 if ok else 1)
          PYEOF

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: robertson-benchmark-results
          path: /tmp/robertson_output.txt
          retention-days: 30
