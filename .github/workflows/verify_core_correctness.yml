name: Core Correctness Verification

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  verify_c_vs_rust:
    name: Numerical Verification (C vs Rust)
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Install System Dependencies for C SUNDIALS
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential python3 python3-numpy

    - name: Run Core Correctness Verification
      run: |
        python3 scripts/verify_c_vs_rust.py
